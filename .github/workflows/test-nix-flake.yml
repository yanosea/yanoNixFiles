name: Test Nix Flake
on:
  pull_request:
    branches:
      - main
  repository_dispatch:
    types: [test-flake]
  workflow_dispatch:
permissions:
  # checkout only; jobs that need more declare it themselves
  contents: read
jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}
          # nothing here pushes, so do not leave the token in .git/config
          persist-credentials: false
      - name: install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: check flake syntax
        run: nix flake check
      - name: check formatting
        run: |
          # run formatter and check if any files changed
          nix fmt
          if ! git diff --exit-code; then
            echo "Files are not properly formatted. Please run 'nix fmt' locally and commit the changes."
            exit 1
          fi
  test-nixos-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - yanoNixOs
          - yanoNixOsWsl
    steps:
      - name: free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - name: checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}
          # nothing here pushes, so do not leave the token in .git/config
          persist-credentials: false
      - name: install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: check NixOS configuration - ${{ matrix.configuration }}
        run: |
          # validate configuration syntax and dependencies
          nix eval .#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel.drvPath \
            --show-trace
      - name: build NixOS configuration - ${{ matrix.configuration }}
        run: |
          # actually build so compile/link failures are caught
          nix build .#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel \
            --show-trace
  test-darwin-builds:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - yanoMac
          - yanoMacBook
    steps:
      - name: checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}
          # nothing here pushes, so do not leave the token in .git/config
          persist-credentials: false
      - name: install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: check Darwin configuration - ${{ matrix.configuration }}
        run: |
          # validate configuration syntax and dependencies
          nix eval .#darwinConfigurations.${{ matrix.configuration }}.system.drvPath \
            --show-trace
      - name: build Darwin configuration - ${{ matrix.configuration }}
        run: |
          # actually build so compile/link failures (e.g. Rust packages) are caught
          nix build .#darwinConfigurations.${{ matrix.configuration }}.system \
            --show-trace
  test-home-manager-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - "yanosea@yanoNixOs"
          - "yanosea@yanoNixOsWsl"
    steps:
      - name: free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - name: checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}
          # nothing here pushes, so do not leave the token in .git/config
          persist-credentials: false
      - name: install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: check Home Manager configuration - ${{ matrix.configuration }}
        run: |
          # validate configuration syntax and dependencies
          nix eval .#homeConfigurations.\"${{ matrix.configuration }}\".activationPackage.drvPath \
            --show-trace
      - name: build Home Manager configuration - ${{ matrix.configuration }}
        run: |
          # actually build so compile/link failures are caught
          nix build .#homeConfigurations.\"${{ matrix.configuration }}\".activationPackage \
            --show-trace
  test-home-manager-darwin-builds:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - "yanosea@yanoMac"
          - "yanosea@yanoMacBook"
    steps:
      - name: checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.client_payload.branch || github.ref }}
          # nothing here pushes, so do not leave the token in .git/config
          persist-credentials: false
      - name: install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: check Home Manager configuration - ${{ matrix.configuration }}
        run: |
          # validate configuration syntax and dependencies
          nix eval .#homeConfigurations.\"${{ matrix.configuration }}\".activationPackage.drvPath \
            --show-trace
      - name: build Home Manager configuration - ${{ matrix.configuration }}
        run: |
          # actually build so compile/link failures (e.g. Rust packages) are caught
          nix build .#homeConfigurations.\"${{ matrix.configuration }}\".activationPackage \
            --show-trace
  report-status:
    runs-on: ubuntu-latest
    needs:
      - lint-and-format
      - test-nixos-builds
      - test-darwin-builds
      - test-home-manager-builds
      - test-home-manager-darwin-builds
    if: always() && (github.event_name == 'repository_dispatch' || github.event_name == 'pull_request')
    permissions:
      # post the rollup commit status
      statuses: write
      # look up the head sha of the dispatched PR
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: determine overall status
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=Some tests failed" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "state=error" >> "$GITHUB_OUTPUT"
            echo "description=Tests were cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=All tests passed" >> "$GITHUB_OUTPUT"
          fi
      - name: get commit SHA
        id: sha
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # pass untrusted dispatch input via env to avoid script injection
          DISPATCH_PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            # the dispatch payload is untrusted, so reject anything but a number
            if [[ ! "$DISPATCH_PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::client_payload.pr_number is not a number"
              exit 1
            fi
            SHA=$(gh api "/repos/$REPOSITORY/pulls/$DISPATCH_PR_NUMBER" --jq '.head.sha')
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi
      - name: report commit status
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}
          STATE: ${{ steps.status.outputs.state }}
          DESCRIPTION: ${{ steps.status.outputs.description }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/statuses/$COMMIT_SHA" \
            -f state="$STATE" \
            -f target_url="$TARGET_URL" \
            -f description="$DESCRIPTION" \
            -f context='Test Nix Flake'
